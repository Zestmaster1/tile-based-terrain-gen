<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    #canvasContainer {
      position: relative;
      height: 1000px;
    }

    canvas {
      position: absolute;
      border: 1px solid black;
    }

    input {
      width: 1500px;
    }
  </style>
</head>
<body>
  <div id="canvasContainer">
    <canvas id="terrain"></canvas>
    <canvas id="ore"></canvas>
    <canvas id="water"></canvas>
    <canvas id="world"></canvas>
  </div>
  <br>
  <div>
    <!-- <button onclick="smooth(); draw()">smooth</button>
    <br> -->
    <label for="waterLevel">water level:</label>
    <input id="waterLevel" type="range" min="0" max="1" step="0.001" value="0.3" oninput="p.waterLevelChange()">
    <br>
    <label for="temperature">temp: </label>
    <input id="temperature" type="range" min="0" max="1" step="0.001" value="0.5" oninput="p.temperatureChange()">
    <br>
    <button onclick="p.allGrass()">all grass</button>
    <button onclick="p.allTrees()">all trees</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
